<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVibe — Mood-Aware Music Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="mb-12 text-center">
            <h1 class="text-5xl font-bold text-gray-900 mb-3">🎵 StudyVibe</h1>
            <p class="text-xl text-gray-600">Mood-Aware Music Recommender for Students & Workers</p>
            <p class="text-sm text-gray-500 mt-2">Find the perfect playlist for what you're doing right now</p>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Input Panel -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-lg p-6 sticky top-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">What are you doing?</h2>

                    <!-- Tabs for sections -->
                    <div class="flex mb-6 border-b border-gray-200">
                        <button
                            class="tab-btn flex-1 py-2 px-4 text-center font-semibold text-gray-700 hover:text-blue-600 border-b-2 border-transparent transition"
                            data-section="student"
                        >
                            📚 Student
                        </button>
                        <button
                            class="tab-btn flex-1 py-2 px-4 text-center font-semibold text-gray-700 hover:text-blue-600 border-b-2 border-transparent transition"
                            data-section="work"
                        >
                            💼 Work
                        </button>
                        <button
                            class="tab-btn flex-1 py-2 px-4 text-center font-semibold text-gray-700 hover:text-blue-600 border-b-2 border-transparent transition"
                            data-section="personal"
                        >
                            🎉 Personal
                        </button>
                    </div>

                    <!-- Mood buttons (dynamic) -->
                    <div id="mood-buttons-container" class="mb-6 grid grid-cols-2 gap-2">
                        <!-- Populated by JavaScript -->
                    </div>

                    <!-- Free text input -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Or describe what you're doing:</label>
                        <textarea
                            id="free-text"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                            placeholder="e.g., studying for exam, coding sprint, gym workout..."
                            rows="4"
                        ></textarea>
                    </div>

                    <!-- Language and Era -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Language:</label>
                            <select id="language" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                                <option>English</option>
                                <option>Nepali</option>
                                <option>Spanish</option>
                                <option>Hindi</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Era:</label>
                            <select id="era" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                                <option>2026</option>
                                <option>2025</option>
                                <option>2020-25</option>
                                <option>2010-20</option>
                            </select>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="mb-6">
                        <label class="flex items-center">
                            <input type="checkbox" id="use-lastfm" checked class="rounded border-gray-300 text-blue-600">
                            <span class="ml-2 text-sm text-gray-700">Use online music database</span>
                        </label>
                    </div>

                    <!-- Submit button -->
                    <button
                        id="recommend-btn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition transform hover:scale-105"
                    >
                        Get Recommendations
                    </button>
                </div>
            </div>

            <!-- Right: Results Panel -->
            <div class="lg:col-span-2">
                <div id="loading" class="hidden text-center py-12">
                    <div class="inline-block">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                    <p class="mt-4 text-gray-600">Finding your perfect playlist...</p>
                </div>

                <div id="results-container" class="hidden space-y-6">
                    <!-- Recommendations Cards -->
                    <div id="recommendations-list">
                        <!-- Populated by JavaScript -->
                    </div>

                    <!-- Pipeline Steps (collapsible) -->
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <button
                            id="pipeline-toggle"
                            class="w-full flex items-center justify-between text-lg font-bold text-gray-900 hover:text-blue-600 transition"
                        >
                            <span>📊 Pipeline Steps</span>
                            <span id="pipeline-chevron">▼</span>
                        </button>
                        <div id="pipeline-details" class="hidden mt-6 space-y-4">
                            <!-- Populated by JavaScript -->
                        </div>
                    </div>

                    <!-- Error message (if any) -->
                    <div id="error-message" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 text-red-800">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>

                <!-- Initial empty state -->
                <div id="empty-state" class="text-center py-12 bg-white rounded-lg shadow-lg">
                    <p class="text-gray-500 text-lg">Select a mood or describe your activity to get started</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Pass sections data to JavaScript -->
    <script>
        window.SECTIONS_DATA = {{ sections_json | safe }};
    </script>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
